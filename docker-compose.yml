services:
  health-backend:
    build:
      context: ./backend
    image: health-backend:0.1.0
    container_name: health-backend
    restart: unless-stopped
    ports:
      - "${HEALTH_BACKEND_PORT:-8080}:31011"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:mysql://host.docker.internal:3306/health?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-health}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-123456}
      HEALTH_UPLOAD_DIRECTORY: /app/data/uploads
      HEALTH_WECHAT_APP_ID: ${HEALTH_WECHAT_APP_ID:-}
      HEALTH_WECHAT_APP_SECRET: ${HEALTH_WECHAT_APP_SECRET:-}
      HEALTH_WECHAT_TOKEN_SECRET: ${HEALTH_WECHAT_TOKEN_SECRET:-change-me-before-production}
    volumes:
      - ./data/uploads:/app/data/uploads
